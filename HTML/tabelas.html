<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>

    <h1>tabelas</h1>

    <!--
        table - tabela
        tr - table row (linha da tabela)
        td - table data (dados da tabela) * table cell (celulas da tabela)
        th - table header (cabeçalho da tabela)  
        Não utilizar o border, somente para fins deestudos.  
    -->


    <table border="1">
        <tr>
            <th>produto</th>
            <th>quantidade</th>
            <th>preço</th>
        </tr>
        <tr>
            <td>notebook</td>
            <td>1</td>
            <td>R$ 2000</td>
        </tr>
        <tr>
            <td>notebook-gamer</td>
            <td>1</td>
            <td>R$ 5000</td>
        </tr>

        <!--
            colspan - extensão da coluna
            rowspan - extensão da linha
        -->

        <tr>
            <td rowspan="2">Desconto:</td>
            <td colspan="2">Cupom-1 R$20</td>
        </tr>

        <tr>
            <td colspan="2">Cupom-1 R$20</td>
        </tr>

    </table>
    
</body>
</html>
