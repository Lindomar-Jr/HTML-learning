<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
</head>
<body>

    <h1>Mais sobre tabelas</h1>
    <!--
        caption - legenda / titulo da tabela
        thead - tabela header (cabeçalho da tabela)
        tbody - table body (corpo da tabela)
        tfoot - table footer (rodapé da tabela)
    -->

     <table border="1">
        <caption>Listagem de produtos</caption>

        <thead>
            <th>produto</th>
            <th>quantidade</th>
            <th>preço</th>
        </thead>

        <tbody>
        <tr>
            <td>celular</td>
            <td>1</td>
            <td>R$ 2000</td>
        </tr>
        <tr>
            <td>pc</td>
            <td>1</td>
            <td>R$ 4000</td>
        </tr>
        </tbody>

        <tfoot>
        <tr>
            <td colspan="2">Total</td>
            <td>R$ 6000</td>
         </tr> 
        </tfoot>
    </table>

    
</body>
</html>
