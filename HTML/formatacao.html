<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--
    <b>(bold - negrito) representa um texto diferente do normal
    <strong> (forte) representa um texto com importância
    <i> (italic) representa um texto em formato italico
    <em> (emphasis - ênfase) coloca alguma ênfase no texto
    <mark> (marca) representa o texto marcado
    -->
    <h2>Formatação de textos:</h2>
    Esse é um texto <b>negrito</b> <br>
    Esse é um texto <strong>importante</strong> <br>
    Esse é um texto <i>itálico</i> <br>
    Esse é um texto <em>ênfase</em> <br>
    Esse é um texto <mark>marcao</mark> <br>
    
    <!--
    <u>(underline - sublinhado) texto com sublinhado
    <del>(deleted - apagado) texto com marcação de apagado
    <sup>(Superscript text - sobrescrito)
    <sub>(Subscript text - subscrito)
    -->
    esse é um texto <u>sublinhado</u> <br>
    esse é um texto <del>apagado</del> <br>
    esse é um texto sobrescrito: 10<sup>2</sup> <br>
    esse é um texto subscrito: H<sub>2</sub>O <br>


</body>
</html>
