<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>formulários</h1>
    <!--
        form - (formulário)
        input - entrada de dados 
        submit - enviar
        button - botão
        action - definir o destino para onde os dados serão enviados
    -->
    <form action="processa.html" method="get">
        Email: <br>
        <input type="text" name="email" placeholder="Digite um email:"> <br>

        Senha: <br>
        <input type="password" name="senha" palceholder="Digite a senha"> <br>

        <input type="submit" value="entrar">

        Comentário: <br>
        <textarea name="comentario" placeholder="Digite um comentário"></textarea>
        <br>
    </form>
    
</body>
</html>
