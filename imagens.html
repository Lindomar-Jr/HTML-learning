<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens</title>
</head>
<body>

    <!--
    img -> Image (imagem)
    src -> source (fonte, origem)
    alt -> alternative (alternativa)
    tipos imagem: png, jpg, jpeg, gif
    widht -> largura
    height -> altura
    figure -> (figura) usada para definir uma foto, ilustração, diagrama etc..
    figcaption -> usado para definir um texto pra imagem
    -->
     
    <h3>EXEMPLOS IMAGENS:</h3>
    <em>apenas uma ênfase para teste:</em>

    <figure>
        <img src="imagens/Captura de tela 2026-06-07 194529.png"
            alt="failed image"
            width="1545" 
            height="987"
            title="imagem sql">
            <figcaption>texto teste imagem sql</figcaption>
    </figure>
 

    <img src="imagens/Captura de tela 2026-06-28 102003.png"
        alt="failed image"
        width="1085"
        height="943">

    <img src="imagens/Captura de tela 2026-06-28 102030.png"
        alt="failed image"
        width="1427"
        height="981">

    <img src="imagens/Captura de tela 2026-06-28 102050.png"
        alt="failed image"
        width="430"
        height="402">
    
</body>
</html>
