<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->
    <script src="https://unpkg.com/@codans/trello"></script>
    
</head>
<body>

    <img src="img/trello.svg" width="200">
    <h1>Fazer login no Trello</h1>

    <form action="processa.html" method="get">
      <input type="text" name="email" placeholder="Insira o e-mail">
      <input type="text" name="senha" placeholder="Insira a senha">
      <input type="submit" value="Fazer login">

      <span>Ou</span>

      <button>
        <img src="img/google.svg" width="20" alt="Google">
        Continuar com Google
      </button>

      <button>
        <img src="img/microsoft.svg" width="20" alt="Microsoft">
        Continuar com Microsoft
      </button>

      <button>
        <img src="img/apple.svg" width="20" alt="Apple">
        Continuar com Apple
      </button>

      <button>
        <img src="img/slack.svg" width="20" alt="Slack">
        Continuar com Slack
      </button> 
    </form>

    <img src="img/atlassian.svg" width="200" alt="Atlasian">
    <img src="img/analytics.svg" width="200" alt="Analytcs">
    <img src="img/interactive.svg" width="200" alt="interactive">

</body>
</html>
